<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Welcome - STAR</title>
  <style>
    :root{
      --font-sans:"Avenir Next","Segoe UI","Helvetica Neue",Arial,sans-serif;
      --font-serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif;
      --page-bg:
        radial-gradient(circle at top center, rgba(251,230,194,0.78), transparent 34%),
        linear-gradient(180deg, #fff8ea 0%, #f7ead0 100%);
      --panel:#fffdf8;
      --panel-border:#ead7ab;
      --panel-shadow:0 18px 36px rgba(125,89,34,0.12);
      --text:#243047;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: var(--page-bg);
      color: var(--text);
      font-family: var(--font-sans);
    }
    main {
      width: min(100%, 560px);
      text-align: center;
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 30px;
      box-shadow: var(--panel-shadow);
      padding: 40px 28px;
    }
    h1 {
      margin: 0 0 12px;
      font-family: var(--font-serif);
      font-size: clamp(2.1rem, 5vw, 3.1rem);
      color: #724016;
    }
    p {
      margin: 0 0 24px;
      line-height: 1.55;
      color: #667188;
    }
    button {
      border: 1px solid #2bbf67;
      background: linear-gradient(180deg,#49da7b 0%,#22c55e 100%);
      color: #08331d;
      font-size: 1.05rem;
      font-weight: 800;
      padding: 16px 22px;
      border-radius: 18px;
      cursor: pointer;
      min-width: 220px;
    }
  </style>
</head>
<body>
  <main>
    <h1>Welcome to the group</h1>
    <p id="welcomeCopy">You are connected and ready for the next step.</p>
    <button id="continueBtn" type="button">Continue</button>
  </main>
  <script type="module">
    import { rest, getSessionFromStorage } from './restClient.js';

    const continueBtn = document.getElementById('continueBtn');

    continueBtn.addEventListener('click', async () => {
      const session = getSessionFromStorage();
      if (!session?.user?.id) return;
      await rest(`profiles?id=eq.${encodeURIComponent(session.user.id)}`, {
        method: 'PATCH',
        headers: { Prefer: 'return=representation' },
        body: JSON.stringify({ onboarding_step: 'checkin' }),
      });
      import('./router.js').then(m => m.next());
    });
  </script>
</body>
</html>
