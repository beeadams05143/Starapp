<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>STAR Authentication</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --font-sans:"Avenir Next","Segoe UI","Helvetica Neue",Arial,sans-serif;
      --font-serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif;
      --page-bg:
        radial-gradient(circle at top center, rgba(251,230,194,0.78), transparent 34%),
        linear-gradient(180deg, #fff8ea 0%, #f7ead0 100%);
      --panel:#fffdf8;
      --panel-border:#ead7ab;
      --panel-shadow:0 18px 36px rgba(125,89,34,0.12);
      --text:#243047;
      --muted:#667188;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: var(--font-sans);
      background: var(--page-bg);
      color: var(--text);
    }
    main {
      width: min(100%, 420px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 30px;
      box-shadow: var(--panel-shadow);
      padding: 34px 28px;
    }
    h1 {
      margin: 0 0 10px;
      font-family: var(--font-serif);
      font-size: clamp(2rem, 5vw, 3rem);
      color: #724016;
      text-align: center;
    }
    p {
      margin: 0 0 22px;
      color: var(--muted);
      line-height: 1.55;
      text-align: center;
    }
    label {
      display: block;
      margin: 12px 0 8px;
      font-weight: 800;
      color: #20324f;
    }
    input {
      width: 100%;
      padding: 14px 16px;
      border-radius: 16px;
      border: 1px solid #d7dee9;
      font-size: 1rem;
    }
    button {
      width: 100%;
      margin-top: 18px;
      border: 1px solid #2bbf67;
      background: linear-gradient(180deg,#49da7b 0%,#22c55e 100%);
      color: #08331d;
      font-size: 1rem;
      font-weight: 800;
      padding: 15px 18px;
      border-radius: 18px;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }
    #message {
      min-height: 20px;
      margin-top: 14px;
      color: #991b1b;
      font-weight: 600;
      text-align: center;
    }
    #message.ok { color: #166534; }
  </style>
</head>
<body>
  <main>
    <h1>Welcome to STAR</h1>
    <p>Enter your email and password once. STAR will sign you in or create your account automatically.</p>
    <form id="authForm" novalidate>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" placeholder="you@example.com" required />

      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" placeholder="Your password" required />

      <button id="continueBtn" type="submit">Continue</button>
    </form>
    <div id="message" role="status" aria-live="polite"></div>
  </main>

  <script type="module">
    import {
      SUPABASE_URL,
      SUPABASE_ANON_KEY,
      saveSession,
      getSessionFromStorage,
    } from './supabaseClient.js?v=2026.03.29A';

    const ROLE_SELECT_URL = 'role-select.html';
    const form = document.getElementById('authForm');
    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const continueBtn = document.getElementById('continueBtn');
    const messageEl = document.getElementById('message');
    const EMAIL_REGEX = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

    function setMessage(text, ok = false) {
      messageEl.textContent = text || '';
      messageEl.classList.toggle('ok', !!ok);
    }

    function setBusy(on) {
      continueBtn.disabled = on;
    }

    function validateEmail(email) {
      return EMAIL_REGEX.test(email || '') ? '' : 'Please enter a valid email address';
    }

    function validatePassword(password) {
      if ((password || '').length < 8) return 'Password must be at least 8 characters';
      const hasNumberOrSymbol = /[0-9!@#$%^&*]/.test(password || '');
      return hasNumberOrSymbol ? '' : 'Password must include at least one number or special character';
    }

    function normalizeSession(payload) {
      if (!payload || typeof payload !== 'object') return null;
      if (payload.session) return payload.session;
      if (!payload.access_token) return null;
      return {
        access_token: payload.access_token,
        refresh_token: payload.refresh_token || null,
        expires_in: payload.expires_in ?? null,
        expires_at:
          payload.expires_at ??
          (payload.expires_in ? Math.floor(Date.now() / 1000) + Number(payload.expires_in || 0) : null),
        token_type: payload.token_type || 'bearer',
        user: payload.user ?? null,
      };
    }

    async function requestAuth(path, body) {
      const response = await fetch(`${SUPABASE_URL}${path}`, {
        method: 'POST',
        headers: {
          apikey: SUPABASE_ANON_KEY,
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(body),
      });
      const text = await response.text();
      const payload = text ? JSON.parse(text) : null;
      if (!response.ok) {
        const message =
          payload?.error_description ||
          payload?.error ||
          payload?.message ||
          text ||
          'Authentication failed';
        const error = new Error(message);
        error.payload = payload;
        error.status = response.status;
        throw error;
      }
      const session = normalizeSession(payload);
      if (session) saveSession(session);
      return payload;
    }

    async function logIn(email, password) {
      return requestAuth('/auth/v1/token?grant_type=password', { email, password });
    }

    async function signUp(email, password) {
      return requestAuth('/auth/v1/signup', { email, password });
    }

    function shouldAttemptSignup(error) {
      const message = String(error?.message || '').toLowerCase();
      return message.includes('invalid login credentials') ||
             message.includes('user not found') ||
             message.includes('invalid credentials');
    }

    async function authenticate(email, password) {
      try {
        await logIn(email, password);
        return;
      } catch (loginError) {
        if (!shouldAttemptSignup(loginError)) throw loginError;
        try {
          await signUp(email, password);
        } catch (signupError) {
          const message = String(signupError?.message || '').toLowerCase();
          if (message.includes('already registered') || message.includes('already been registered')) {
            throw loginError;
          }
          throw signupError;
        }
        await logIn(email, password);
      }
    }

    if (getSessionFromStorage()?.user?.id) {
      import('./router.js').then(m => m.next());
    }

    form.addEventListener('submit', async (event) => {
      event.preventDefault();
      setMessage('');
      setBusy(true);
      try {
        const email = (emailEl.value || '').trim();
        const password = passwordEl.value || '';
        const emailError = validateEmail(email);
        if (emailError) throw new Error(emailError);
        const passwordError = validatePassword(password);
        if (passwordError) throw new Error(passwordError);

        await authenticate(email, password);
        const session = getSessionFromStorage();
        if (!session?.user?.id) throw new Error('Authentication did not return a valid session.');
        try { localStorage.setItem('user_id', session.user.id); } catch {}
        setMessage('Success! Redirecting…', true);
        import('./router.js').then(m => m.next());
      } catch (error) {
        console.error('[AUTH] continue failed', error);
        setMessage(error?.message || 'Authentication failed.');
      } finally {
        setBusy(false);
      }
    });
  </script>
</body>
</html>
