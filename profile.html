
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 16px; }
    h1 { margin: 16px 0; }
    .avatar-block {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      margin: 1rem 0 1.25rem;
    }
    .avatar-big {
      width: 96px; height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ddd;
      background: #f7f7f7;
    }
    .edit-avatar-btn {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #ccc; border-radius: 6px;
      background: #fff; cursor: pointer;
      font-size: 16px;
    }
    .edit-avatar-btn:hover { background: #f2f2f2; }
    .form { margin: 12px 0 16px; display: grid; gap: 10px; max-width: 480px; }
    label { font-weight: 600; }
    input[type="text"], select {
      padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%;
    }
    #saveBtn { padding: 10px 14px; border: 0; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
    #saveBtn:hover { background: #1f55c8; }
    small { opacity: .7; display: block; margin-top: 6px; }
    #profileMessage {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    #profileMessage.ok {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    #profileMessage.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  

  <h1>Update Your Profile</h1>

  <div class="avatar-block">
    <img id="avatarPreview" src="IMG/default-avatar.png" alt="Your avatar" class="avatar-big">
    <button id="editAvatarBtn" type="button" class="edit-avatar-btn" title="Change avatar">✏️</button>
    <input id="avatarFile" type="file" accept="image/*"
      style="position:absolute;left:-9999px;width:1px;height:1px;opacity:0;" />
  </div>

  <div class="form">
    <div>
      <label for="displayName">Display Name</label>
      <input id="displayName" type="text" placeholder="Enter your name" />
    </div>

    <div>
      <label for="profile-group-select">Default Group</label>
      <select id="profile-group-select">
        <option value="3159dde9-8cf3-4a29-af72-01da907f241b">Family</option>
      </select>
      <small>This selection is saved to your profile and auto-used across the app.</small>
    </div>
  </div>

<button id="saveBtn" type="button">Save Profile</button>
<div id="profileMessage" role="status" aria-live="polite"></div>

  <script type="module">
    import { supabase } from './supabaseClient.js?v=2025.10.15f';

    const defaultAvatar     = 'IMG/default-avatar.png';
    const avatarPreview     = document.getElementById('avatarPreview');
    const editAvatarBtn     = document.getElementById('editAvatarBtn');
    const avatarFile        = document.getElementById('avatarFile');
    const displayNameEl     = document.getElementById('displayName');
    const groupSelectEl     = document.getElementById('profile-group-select');
    const saveBtn           = document.getElementById('saveBtn');
    const profileMessage    = document.getElementById('profileMessage');
    let messageTimer        = null;

    const GROUP_KEY_ID      = 'currentGroupId';
    const GROUP_KEY_NAME    = 'currentGroupName';
    const DEFAULT_GROUP     = {
      id: '3159dde9-8cf3-4a29-af72-01da907f241b',   // existing "Family" group id
      name: 'Family'
    };

    let currentUser = null;

    // -------- helpers --------
    function cacheSelectedGroup() {
      try {
        const opt = groupSelectEl.options?.[groupSelectEl.selectedIndex] || null;
        if (!opt) return;
        localStorage.setItem(GROUP_KEY_ID, opt.value || '');
        localStorage.setItem(GROUP_KEY_NAME, opt.textContent || DEFAULT_GROUP.name);
      } catch (err) {
        console.warn('[PROFILE] cacheSelectedGroup failed', err);
      }
    }

    function ensureGroupOption(id, label) {
      if (!groupSelectEl || !id) return;
      const exists = Array.from(groupSelectEl.options || []).some(opt => opt.value === id);
      if (!exists) {
        groupSelectEl.add(new Option(label || DEFAULT_GROUP.name, id));
      }
    }

    async function loadGroups() {
      groupSelectEl.disabled = true;
      groupSelectEl.innerHTML = `<option value="${DEFAULT_GROUP.id}">${DEFAULT_GROUP.name}</option>`;

      let groups = [];
      try {
        const { data, error } = await supabase
          .from('groups')
          .select('id,name,archived')
          .order('name', { ascending: true });

        if (error) throw error;
        groups = (data || []).filter(g => !g?.archived);
      } catch (err) {
        console.warn('[PROFILE] Supabase groups fetch failed; falling back to default', err);
      }

      if (!groups.length) {
        groups = [DEFAULT_GROUP];
      }

      groupSelectEl.innerHTML = groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');

      const cachedId = localStorage.getItem(GROUP_KEY_ID);
      const match = groups.find(g => g.id === cachedId);
      groupSelectEl.value = match ? match.id : groups[0].id;
      groupSelectEl.disabled = false;
      cacheSelectedGroup();
    }

    async function preloadProfile({ silent=false } = {}) {
      try {
        const { data: { session }, error: sessionErr } = await supabase.auth.getSession();
        if (sessionErr) console.warn('[PROFILE] getSession error', sessionErr);
        currentUser = session?.user || null;

        if (!currentUser) {
          showMessage('Please log in first.', false);
          location.href = './login.html';
          return;
        }

        const metaName =
          currentUser.user_metadata?.full_name ||
          currentUser.user_metadata?.name ||
          currentUser.email ||
          '';

        displayNameEl.value = metaName;
        avatarPreview.src = defaultAvatar;

        const { data: profile, error: profileErr } = await supabase
          .from('profiles')
          .select('display_name, public_name, full_name, avatar_url, group_id, updated_at')
          .eq('id', currentUser.id)
          .maybeSingle();

        if (profileErr && profileErr.code !== 'PGRST116') {
          console.error('[PROFILE] load profile error', profileErr);
          showMessage(profileErr.message || 'Could not load profile.', false);
        }

        if (profile && Object.keys(profile).length) {
          displayNameEl.value = profile.display_name || profile.public_name || profile.full_name || metaName;
          if (profile.avatar_url) {
            avatarPreview.src = profile.avatar_url;
          }
          if (profile.group_id) {
            try {
              const { data: g } = await supabase
                .from('groups')
                .select('name')
                .eq('id', profile.group_id)
                .maybeSingle();
              ensureGroupOption(profile.group_id, g?.name || 'Selected group');
              groupSelectEl.value = profile.group_id;
              if (g?.name) localStorage.setItem(GROUP_KEY_NAME, g.name);
            } catch (groupErr) {
              console.warn('[PROFILE] fetch group name failed', groupErr);
              ensureGroupOption(profile.group_id, 'Selected group');
              groupSelectEl.value = profile.group_id;
            }
            cacheSelectedGroup();
          }
          if (!silent) {
            if (profile.updated_at) {
              showMessage(`Profile loaded · ${new Date(profile.updated_at).toLocaleString()}`, true);
            } else {
              showMessage('Profile loaded ✓', true);
            }
          }
        }
      } catch (err) {
        console.error('[PROFILE] preload failed', err);
        if (!silent) showMessage('Could not load profile. Try again shortly.', false);
      }
    }

    async function saveProfile() {
      const originalLabel = saveBtn.textContent;

      const startSaving = () => {
        saveBtn.disabled = true;
        saveBtn.textContent = 'Saving…';
        showMessage('Saving…', true);
      };
      const finishSaving = () => {
        saveBtn.disabled = false;
        saveBtn.textContent = originalLabel;
      };

      startSaving();
      console.log('[PROFILE] starting save');
      try {
        if (!currentUser) {
          const { data: { user }, error: fetchErr } = await supabase.auth.getUser();
          if (fetchErr) throw fetchErr;
          currentUser = user || null;
        }

        if (!currentUser) {
          showMessage('Please log in first.', false);
          location.href = './login.html';
          return;
        }

        const display_name    = (displayNameEl.value || '').trim() || currentUser.email || null;
        const selectedGroupId = groupSelectEl.value || DEFAULT_GROUP.id;
        let avatar_url = null;
        const timestamp = new Date().toISOString();

        if (avatarFile.files.length > 0) {
          const file = avatarFile.files[0];
          const path = `${currentUser.id}/${file.name}`;
          const { error: uploadErr } = await supabase
            .storage.from('avatars')
            .upload(path, file, { upsert: true });
          if (uploadErr) throw uploadErr;
          const { data: pub } = supabase.storage.from('avatars').getPublicUrl(path);
          avatar_url = pub.publicUrl;
        }

        const payload = {
          id: currentUser.id,
          display_name,
          public_name: display_name,
          full_name: display_name,
          group_id: selectedGroupId,
          updated_at: timestamp,
          ...(avatar_url ? { avatar_url } : {})
        };
        console.log('[PROFILE] payload', payload);

        const { data: savedRow, error: upsertErr } = await supabase
          .from('profiles')
          .upsert(payload, { onConflict: 'id' })
          .select('display_name, public_name, full_name, avatar_url, group_id, updated_at')
          .maybeSingle();

        if (upsertErr) throw upsertErr;
        console.log('[PROFILE] savedRow', savedRow);

        try {
          await supabase
            .from('group_members')
            .upsert(
              { group_id: selectedGroupId, user_id: currentUser.id },
              { onConflict: 'group_id,user_id' }
            );
        } catch (memberErr) {
          console.warn('[PROFILE] group membership upsert failed', memberErr);
        }

        cacheSelectedGroup();

        const applied = savedRow || payload;
        if (applied.display_name) displayNameEl.value = applied.display_name;
        if (applied.avatar_url) avatarPreview.src = applied.avatar_url;
        else if (!avatarPreview.src) avatarPreview.src = defaultAvatar;
        if (applied.group_id) {
          ensureGroupOption(applied.group_id, groupSelectEl?.selectedOptions?.[0]?.textContent || DEFAULT_GROUP.name);
          groupSelectEl.value = applied.group_id;
          cacheSelectedGroup();
        }

        const savedAt = new Date(applied.updated_at || timestamp)
          .toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
        showMessage(`Profile saved! ✅ ${savedAt}`, true);
        await preloadProfile({ silent: true });
      } catch (err) {
        console.error('[PROFILE] save failed', err);
        const errorDetail =
          err?.message ||
          err?.error_description ||
          err?.error ||
          (typeof err === 'string' ? err : JSON.stringify(err));
        const msg = 'Could not save profile: ' + errorDetail;
        showMessage(msg, false);
        alert(msg);
      } finally {
        finishSaving();
      }
    }

    function showMessage(text, ok) {
      if (!profileMessage) return;
      clearTimeout(messageTimer);
      profileMessage.textContent = text || '';
      profileMessage.classList.remove('ok', 'error');
      if (!text) {
        profileMessage.style.display = 'none';
        return;
      }
      profileMessage.style.display = 'block';
      profileMessage.classList.add(ok ? 'ok' : 'error');
      profileMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
      messageTimer = setTimeout(() => {
        profileMessage.style.display = 'none';
        profileMessage.classList.remove('ok', 'error');
        profileMessage.textContent = '';
      }, ok ? 4800 : 5000);
    }

    // -------- wire up UI --------
    document.addEventListener('DOMContentLoaded', async () => {
      await loadGroups();
      await preloadProfile();
      setTimeout(() => {
        if (!groupSelectEl) return;
        if (groupSelectEl.disabled) {
          groupSelectEl.disabled = false;
        }
        if (!groupSelectEl.options.length) {
          groupSelectEl.innerHTML = `<option value="${DEFAULT_GROUP.id}">${DEFAULT_GROUP.name}</option>`;
        }
      }, 1000);
    });

    const triggerAvatarPicker = () => {
      if (!avatarFile) return;
      try {
        if (typeof avatarFile.showPicker === 'function') {
          avatarFile.showPicker();
          return;
        }
      } catch (err) {
        console.warn('[PROFILE] showPicker failed, fallback to click', err);
      }
      avatarFile.click();
    };

    editAvatarBtn.addEventListener('click', (evt) => {
      evt.preventDefault();
      triggerAvatarPicker();
    });

    avatarFile.addEventListener('change', () => {
      const file = avatarFile.files[0];
      if (file) avatarPreview.src = URL.createObjectURL(file);
    });
    saveBtn.addEventListener('click', saveProfile);
    groupSelectEl?.addEventListener('change', cacheSelectedGroup);
    
  </script>

<script defer src="./scripts/appbar-drawer.js?v=2025.10.15f"></script>
<script defer src="./ui-shell.js?v=2025.10.15f"></script>

<script type="module" src="./avatar-float.js?v=2025.10.15f"></script>



</body>
</html>
