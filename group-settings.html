<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Group Settings</title>
  <style>
    :root{
      --font-sans:"Avenir Next","Segoe UI","Helvetica Neue",Arial,sans-serif;
      --font-serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif;
      --page-bg:
        radial-gradient(circle at top center, rgba(251,230,194,0.78), transparent 36%),
        linear-gradient(180deg, #fff8ea 0%, #f7ead0 100%);
      --panel:#fffdf8;
      --panel-border:#ead7ab;
      --panel-shadow:0 18px 36px rgba(125,89,34,0.12);
      --text:#243047;
      --muted:#667188;
      --navy:#20324f;
    }
    body{
      font-family:var(--font-sans);
      margin:0;
      min-height:100vh;
      padding:24px 16px calc(96px + env(safe-area-inset-bottom, 0px));
      background:var(--page-bg);
      color:var(--text);
    }
    h1{
      margin:8px 0 20px;
      font-family:var(--font-serif);
      font-size:clamp(2.4rem,5vw,3.5rem);
      color:#724016;
      text-align:left;
    }
    .card{
      max-width:720px;
      border:1px solid var(--panel-border);
      border-radius:28px;
      padding:20px 22px;
      margin:16px 0;
      background:var(--panel);
      box-shadow:var(--panel-shadow);
    }
    .row{display:flex;gap:8px;align-items:center;margin:8px 0;flex-wrap:wrap}
    input[type="text"]{
      flex:1;
      padding:14px 18px;
      border:1.5px solid #cfd8e6;
      border-radius:18px;
      background:#fff;
      font-size:1.15rem;
      color:var(--text);
    }
    button{
      padding:13px 18px;
      border-radius:18px;
      cursor:pointer;
      border:1px solid #d8c7a4;
      font-family:var(--font-sans);
      font-size:1.05rem;
      font-weight:700;
      box-shadow:0 10px 24px rgba(36,48,71,0.08);
    }
    .primary{background:linear-gradient(180deg,#49da7b 0%,#22c55e 100%);color:#08331d;border-color:#2bbf67}
    .danger{background:#fff1f2;color:#b91c1c;border-color:#fecdd3}
    .muted{background:#fffdf8;color:var(--navy)}
    .status{min-height:18px;margin-top:8px;color:#1d4ed8;font-size:15px}
    .status.error{color:#b91c1c}
    small{opacity:1;color:var(--muted);font-style:italic;font-size:15px}
    .mono{font-family:ui-monospace,SFMono-Regular,Consolas,monospace}
    h3{
      margin:0 0 14px;
      font-family:var(--font-serif);
      font-size:2rem;
      color:var(--navy);
      text-align:left;
    }
    label{
      color:var(--navy);
      font-size:1.05rem;
    }
  </style>
</head>
<body>
  <h1>Group Settings</h1>

  <div class="card">
    <h3>Invite people</h3>
    <div class="row">
      <label class="mono">Invite code:</label>
      <input id="inviteCode" type="text" readonly value="loading..."/>
      <button id="copyMessageBtn" class="primary">Copy Invite Message</button>
      <button id="copyBtn" class="muted">Copy Code</button>
    </div>
    <div id="inviteStatus" class="status" role="status" aria-live="polite"></div>
    <small>Share this code with family. They can join from the form below.</small>
  </div>

  <div class="card">
    <h3>Join a group by code</h3>
    <div class="row">
      <input id="joinCode" type="text" placeholder="Paste invite code here"/>
      <button id="joinBtn" class="primary">Join Group</button>
    </div>
  </div>

  <div class="card">
    <h3>Leave this group</h3>
    <div class="row">
      <button id="leaveBtn" class="danger">Leave Current Group</button>
    </div>
  </div>

  <script type="module">
    import { rest, getSessionFromStorage } from './restClient.js?v=2026.03.16B';
    import { ensureActiveGroupId } from './active-group.js?v=2026.03.12A';
    import {
      fetchCurrentProfile,
      buildInviteMessage,
      deriveInviterContact,
      resolveInviteCodeValue,
    } from './onboarding-flow.js?v=2026.03.16B';

    const GROUP_KEY = 'currentGroupId';
    const inviteCodeEl = document.getElementById('inviteCode');
    const copyMessageBtn = document.getElementById('copyMessageBtn');
    const copyBtn      = document.getElementById('copyBtn');
    const joinCodeEl   = document.getElementById('joinCode');
    const joinBtn      = document.getElementById('joinBtn');
    const leaveBtn     = document.getElementById('leaveBtn');
    const inviteStatusEl = document.getElementById('inviteStatus');

    let currentInviteGroup = null;
    let currentProfile = null;

    const getActiveGroupId = () => localStorage.getItem(GROUP_KEY) || null;
    const setInviteStatus = (text, isError = false) => {
      inviteStatusEl.textContent = text || '';
      inviteStatusEl.classList.toggle('error', !!isError);
    };

    async function requireSession(){
      const session = getSessionFromStorage();
      if (!session?.user?.id) { alert('Please log in first.'); location.href = './auth.html'; throw new Error('no session'); }
      return session;
    }

    async function syncActiveGroupId() {
      const session = await requireSession();
      const gid = await ensureActiveGroupId(session.user.id);
      if (gid) {
        try { localStorage.setItem(GROUP_KEY, gid); } catch {}
      }
      return gid || null;
    }

    async function loadInviteCode(){
      const gid = getActiveGroupId() || await syncActiveGroupId();
      if (!gid) {
        currentInviteGroup = null;
        inviteCodeEl.value = 'no active group';
        return;
      }
      try {
        const rows = await rest(`groups?id=eq.${encodeURIComponent(gid)}&select=id,name,invite_code,join_code`);
        currentInviteGroup = rows?.[0] || null;
        inviteCodeEl.value = resolveInviteCodeValue(currentInviteGroup) || '(none)';
      } catch (error){
        console.error(error);
        currentInviteGroup = null;
        inviteCodeEl.value='(error)';
      }
    }

    function getInviteJoinLink() {
      return new URL('auth.html', window.location.href).toString();
    }

    async function copyToClipboard(text) {
      await navigator.clipboard.writeText(text);
    }

    function buildCurrentInviteMessage(roleHint = 'general') {
      const session = getSessionFromStorage();
      const { inviterName, inviterEmail } = deriveInviterContact({
        user: session?.user || null,
        profile: currentProfile,
      });
      const inviteCode = resolveInviteCodeValue(currentInviteGroup) || inviteCodeEl.value || '';
      return buildInviteMessage({
        appName: 'STAR App',
        joinLink: getInviteJoinLink(),
        inviteCode,
        groupName: currentInviteGroup?.name || '',
        inviterName,
        inviterEmail,
        roleHint,
      });
    }

    copyMessageBtn.addEventListener('click', async () => {
      if (!currentInviteGroup?.id) {
        setInviteStatus('No active group invite is available yet.', true);
        return;
      }
      try {
        await copyToClipboard(buildCurrentInviteMessage());
        setInviteStatus('Invite message copied.');
      } catch (error) {
        console.error(error);
        setInviteStatus(error?.message || 'Could not copy the invite message automatically.', true);
      }
    });

    copyBtn.addEventListener('click', async () => {
      const inviteCode = resolveInviteCodeValue(currentInviteGroup) || '';
      if (!inviteCode || inviteCodeEl.value.includes('loading')) {
        setInviteStatus('No active invite code is available to copy.', true);
        return;
      }
      try {
        await copyToClipboard(inviteCode);
        setInviteStatus('Invite code copied.');
        copyBtn.textContent = 'Copied!';
        setTimeout(()=> copyBtn.textContent='Copy Code', 900);
      } catch (error) {
        console.error(error);
        setInviteStatus('Could not copy the invite code automatically.', true);
      }
    });

    joinBtn.addEventListener('click', async () => {
      const code = (joinCodeEl.value || '').trim();
      if (!code) return alert('Enter a code.');
      await requireSession();
      try {
        const rows = await rest('rpc/join_group', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ p_code: code }),
        });
        const newGroupId = rows?.[0]?.group_id;
        if (newGroupId) {
          localStorage.setItem(GROUP_KEY, newGroupId);
          window.loadGroupsIntoSwitcher?.();   // refresh navbar switcher if present
          alert('Joined group!');
          await loadInviteCode();
        }
      } catch (error) {
        console.error(error);
        alert(error?.message || 'Join failed');
      }
    });

    leaveBtn.addEventListener('click', async () => {
      const gid = getActiveGroupId();
      if (!gid) return alert('No active group.');
      if (!confirm('Leave this group?')) return;
      const session = getSessionFromStorage();
      if (!session?.user?.id) return alert('Please log in first.');
      try {
        await rest(`group_members?group_id=eq.${encodeURIComponent(gid)}&user_id=eq.${encodeURIComponent(session.user.id)}`, {
          method: 'DELETE',
          headers: { Prefer: 'return=minimal' },
        });
      } catch (error) {
        console.error(error);
        alert('Could not leave group.');
        return;
      }
      localStorage.removeItem(GROUP_KEY);
      window.loadGroupsIntoSwitcher?.();
      currentInviteGroup = null;
      inviteCodeEl.value = 'no active group';
      alert('You left the group.');
    });

    (async () => {
      try {
        const session = await requireSession();
        currentProfile = await fetchCurrentProfile(session.user.id);
        await syncActiveGroupId();
        await loadInviteCode();
      } catch (error) {
        console.error(error);
        setInviteStatus(error?.message || 'Could not load your invite settings.', true);
      }
    })();
  </script>
  <script defer src="./scripts/appbar-drawer.js?v=2026.03.16B"></script>
  <script defer src="./ui-shell.js?v=2026.03.16B"></script>
  <script>
    (function(){
      const version = window.STAR_BUILD_VERSION || '2026.03.29A';
      if (!window.STAR_BUILD_VERSION) window.STAR_BUILD_VERSION = version;
      const ensureBadge = () => {
        if (document.getElementById('star-build-version')) return;
        const badge = document.createElement('div');
        badge.id = 'star-build-version';
        badge.textContent = `Build ${version}`;
        badge.style.cssText = `
          position:fixed;
          right:12px;
          bottom:12px;
          background:rgba(17,17,17,0.85);
          color:#f9fafb;
          font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
          font-size:11px;
          font-weight:600;
          letter-spacing:0.02em;
          padding:6px 10px;
          border-radius:10px;
          box-shadow:0 6px 18px rgba(0,0,0,0.18);
          z-index:998;
          pointer-events:none;
        `;
        document.body.appendChild(badge);
      };
      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', ensureBadge, { once: true });
      } else {
        ensureBadge();
      }
    })();
  </script>
</body>
</html>
