
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Profile</title>
  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; padding: 16px; }
    h1 { margin: 16px 0; }
    .avatar-block {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: .5rem;
      margin: 1rem 0 1.25rem;
    }
    .avatar-big {
      width: 96px; height: 96px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ddd;
      background: #f7f7f7;
    }
    .edit-avatar-btn {
      width: 32px; height: 32px;
      display: inline-flex; align-items: center; justify-content: center;
      border: 1px solid #ccc; border-radius: 6px;
      background: #fff; cursor: pointer;
      font-size: 16px;
    }
    .edit-avatar-btn:hover { background: #f2f2f2; }
    .form { margin: 12px 0 16px; display: grid; gap: 10px; max-width: 480px; }
    label { font-weight: 600; }
    input[type="text"], select {
      padding: 10px; border: 1px solid #ccc; border-radius: 6px; width: 100%;
    }
    #saveBtn { padding: 10px 14px; border: 0; border-radius: 8px; background: #2563eb; color: white; cursor: pointer; }
    #saveBtn:hover { background: #1f55c8; }
    small { opacity: .7; display: block; margin-top: 6px; }
    #profileMessage {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 14px;
      display: none;
    }
    #profileMessage.ok {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    #profileMessage.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
  </style>
</head>
<body>
  

  <h1>Update Your Profile</h1>

  <div class="avatar-block">
    <img id="avatarPreview" src="IMG/default-avatar.png" alt="Your avatar" class="avatar-big">
    <button id="editAvatarBtn" class="edit-avatar-btn" title="Change avatar">✏️</button>
    <input id="avatarFile" type="file" accept="image/*" style="display:none" />
  </div>

  <div class="form">
    <div>
      <label for="displayName">Display Name</label>
      <input id="displayName" type="text" placeholder="Enter your name" />
    </div>

    <div>
      <label for="profile-group-select">Default Group</label>
      <select id="profile-group-select">
        <option value="">Loading…</option>
      </select>
      <small>This selection is saved to your profile and auto-used across the app.</small>
    </div>
  </div>

  <button id="saveBtn">Save Profile</button>
  <div id="profileMessage" role="status" aria-live="polite"></div>

  <script type="module">
    import { supabase } from './supabaseClient.js';

    const defaultAvatar     = 'IMG/default-avatar.png';
    const avatarPreview     = document.getElementById('avatarPreview');
    const editAvatarBtn     = document.getElementById('editAvatarBtn');
    const avatarFile        = document.getElementById('avatarFile');
    const displayNameEl     = document.getElementById('displayName');
    const groupSelectEl     = document.getElementById('profile-group-select');
    const saveBtn           = document.getElementById('saveBtn');
    const profileMessage    = document.getElementById('profileMessage');

    const GROUP_KEY_ID      = 'currentGroupId';
    const GROUP_KEY_NAME    = 'currentGroupName';
    const DEFAULT_GROUP     = {
      id: '3159dde9-8cf3-4a29-af72-01da907f241b',   // existing "Family" group id
      name: 'Family'
    };

    let currentUser = null;

    // -------- helpers --------
    async function loadGroups() {
      groupSelectEl.disabled = false;
      groupSelectEl.innerHTML = `<option value="${DEFAULT_GROUP.id}">${DEFAULT_GROUP.name}</option>`;
      groupSelectEl.value = DEFAULT_GROUP.id;

      try {
        localStorage.setItem(GROUP_KEY_ID, DEFAULT_GROUP.id);
        localStorage.setItem(GROUP_KEY_NAME, DEFAULT_GROUP.name);
      } catch (err) {
        console.warn('[PROFILE] localStorage default group failed', err);
      }

      try {
        const { data, error } = await supabase
          .from('groups')
          .select('id,name,archived')
          .order('name', { ascending: true });

        if (error) throw error;

        const groups = (data || []).filter(g => !g?.archived);
        if (groups.length) {
          groupSelectEl.innerHTML = groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
          groupSelectEl.value = localStorage.getItem(GROUP_KEY_ID) || groups[0].id;

          try {
            const selected = groupSelectEl.selectedOptions[0];
            if (selected) {
              localStorage.setItem(GROUP_KEY_ID, selected.value);
              localStorage.setItem(GROUP_KEY_NAME, selected.textContent || DEFAULT_GROUP.name);
            }
          } catch (err2) {
            console.warn('[PROFILE] caching fetched group failed', err2);
          }
        }
      } catch (err) {
        console.warn('[PROFILE] Supabase groups fetch failed; using default', err);
      }
    }

    async function preloadProfile() {
      const { data: { user }, error } = await supabase.auth.getUser();
      if (error) console.error(error);
      currentUser = user || null;

      if (!currentUser) {
        alert('Please log in first.');
        return;
      }

      // fetch display_name, avatar_url, group_id
      const { data: p, error: pErr } = await supabase
        .from('profiles')
        .select('display_name, avatar_url, group_id')
        .eq('id', currentUser.id)              // use id as key
        .maybeSingle();

      if (pErr && pErr.code !== 'PGRST116') console.error(pErr);

      displayNameEl.value = p?.display_name || '';
      avatarPreview.src   = p?.avatar_url || defaultAvatar;

      // if we already have a group_id saved, select it and cache it
      if (p?.group_id) {
        groupSelectEl.value = p.group_id;
        localStorage.setItem(GROUP_KEY_ID, p.group_id);
        // cache name too
        try {
          const { data: g } = await supabase.from('groups').select('name').eq('id', p.group_id).single();
          if (g?.name) localStorage.setItem(GROUP_KEY_NAME, g.name);
        } catch {}
      }
    }

    async function saveProfile() {
      if (!currentUser) {
        try {
          const { data: { user } } = await supabase.auth.getUser();
          currentUser = user || null;
        } catch (err) {
          console.warn('[PROFILE] getUser during save failed', err);
        }
      }

      if (!currentUser) {
        showMessage('Please log in first.', false);
        location.href = './login.html';
        return;
      }

      const display_name    = (displayNameEl.value || '').trim() || null;
      const selectedGroupId = groupSelectEl.value || DEFAULT_GROUP.id;
      let avatar_url = null;

      // 1) upload avatar if chosen
      if (avatarFile.files.length > 0) {
        const file = avatarFile.files[0];
        const path = `${currentUser.id}/${file.name}`;
        const { error: uploadErr } = await supabase
          .storage.from('avatars')
          .upload(path, file, { upsert: true });
        if (uploadErr) { console.error(uploadErr); alert('Error uploading avatar'); return; }
        const { data: pub } = supabase.storage.from('avatars').getPublicUrl(path);
        avatar_url = pub.publicUrl;
      }

      // 2) upsert into profiles using id as key
      const payload = {
        id: currentUser.id,                     // <-- key is id
        display_name,
        group_id: selectedGroupId
      };
      if (avatar_url) payload.avatar_url = avatar_url;

      try {
        const { error: upsertErr } = await supabase
          .from('profiles')
          .upsert(payload, { onConflict: 'id' }); // <-- conflict on id

        if (upsertErr) throw upsertErr;
      } catch (err) {
        console.error('[PROFILE] upsert failed', err);
        showMessage('Error saving profile. Please try again.', false);
        return;
      }

      // 3) cache selection for other pages
      localStorage.setItem(GROUP_KEY_ID, selectedGroupId || '');
      const selectedName = groupSelectEl.selectedOptions[0]?.textContent || DEFAULT_GROUP.name;
      localStorage.setItem(GROUP_KEY_NAME, selectedName);

      if (!avatar_url && !avatarPreview.src) avatarPreview.src = defaultAvatar;

      showMessage('Profile saved! ✅', true);
    }

    function showMessage(text, ok) {
      if (!profileMessage) return;
      profileMessage.textContent = text || '';
      profileMessage.classList.remove('ok', 'error');
      if (!text) {
        profileMessage.style.display = 'none';
        return;
      }
      profileMessage.style.display = 'block';
      profileMessage.classList.add(ok ? 'ok' : 'error');
    }

    // -------- wire up UI --------
    document.addEventListener('DOMContentLoaded', async () => {
      await loadGroups();
      await preloadProfile();
    });

    editAvatarBtn.addEventListener('click', () => avatarFile.click());
    avatarFile.addEventListener('change', () => {
      const file = avatarFile.files[0];
      if (file) avatarPreview.src = URL.createObjectURL(file);
    });
    saveBtn.addEventListener('click', saveProfile);
    
  </script>
<!-- page logic(s) ... -->
<script defer src="./scripts/appbar-drawer.js"></script>
<script defer src="./ui-shell.js"></script>

<!-- Floating avatar (optional) -->
<script type="module" src="./avatar-float.js"></script>



</body>
</html>
