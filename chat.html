<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Group Chat</title>

  <!-- Your styles -->
  <link rel="stylesheet" href="chatStyles.css?v=2025.01.09E" />
  <link rel="stylesheet" href="style.css?v=2025.01.09E" />

  <!-- Page-specific styles -->
  <style>
    :root{
      --font-sans:"Avenir Next","Segoe UI","Helvetica Neue",Arial,sans-serif;
      --font-serif:"Iowan Old Style","Palatino Linotype","Book Antiqua",Georgia,serif;
      --page-bg:
        radial-gradient(circle at top center, rgba(251,230,194,0.8), transparent 34%),
        linear-gradient(180deg, #fff8ea 0%, #f7ead0 100%);
      --panel:#fffdf8;
      --panel-border:#ead7ab;
      --panel-shadow:0 18px 36px rgba(125,89,34,0.12);
      --text:#243047;
      --muted:#667188;
    }
    body.star-bg{
      margin:0;
      min-height:100vh;
      background:var(--page-bg);
      color:var(--text);
      font-family:var(--font-sans);
    }
    /* Layout for this page */
    .chat-wrapper { display:flex; justify-content:center; margin:40px auto; padding:0 16px; }
    .chat-card   { width:min(820px, 94vw); padding:18px; }

    /* message list */
    #chatBox {
      height: 360px;
      overflow-y: auto;
      background: rgba(255,255,255,0.96);
      border-radius: 24px;
      padding: 16px;
      border: 1px solid #d8e2ef;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.7);
    }

    /* bubbles */
    .bubble { display:flex; gap:8px; align-items:flex-start; margin:8px 0; }
    .bubble .avatar {
      width:28px; height:28px; border-radius:50%;
      object-fit:cover; flex:0 0 28px;
    }
    .bubble .content { line-height:1.3; }
    .bubble .msg {
      background:#fffdf8;
      border-radius:16px;
      padding:8px 12px;
      border:1px solid #ead7ab;
      box-shadow:0 6px 14px rgba(36,48,71,.06);
    }
    .bubble .meta { font-size:12px; color:var(--muted); margin-top:4px; }

    /* input row */
    .input-row {
      display:flex; gap:8px; margin-top:12px;
      align-items:center;
    }
    #chatInput {
      flex:1;
      height:50px;
      padding:0 16px;
      border-radius:18px;
      border:1.5px solid #cfd8e6;
      background:#fff;
      font-size:1.1rem;
    }
    #sendBtn {
      height:50px;
      padding:0 20px;
      border-radius:18px;
      border:1px solid #2bbf67;
      background:linear-gradient(180deg,#49da7b 0%,#22c55e 100%);
      color:#08331d;
      font-weight:700;
      cursor:pointer;
      box-shadow:0 12px 24px rgba(34,197,94,.22);
    }
    #sendBtn:hover { filter: brightness(0.95); }

    .footnotes { margin-top:14px; font-size:15px; color:var(--muted); font-style:italic; }

    /* optional nice 'glass' panel for the chat card */
    .chat-panel {
      background: var(--panel);
      border:1px solid var(--panel-border);
      border-radius: 30px;
      box-shadow: var(--panel-shadow);
    }

    /* keep inner areas readable */
    .chat-panel #chatBox,
    .chat-panel input,
    .chat-panel button {
      background: rgba(255,255,255,0.95);
    }

    /* avoid overlap with bottom tab bar */
    .chat-wrapper { margin-bottom: calc(80px + env(safe-area-inset-bottom, 0px)); }
    h2{
      margin:4px 0 18px;
      text-align:center;
      font-family:var(--font-serif);
      font-size:clamp(2rem,4vw,3rem);
      color:#724016;
    }
  </style>
</head>
<body class="star-bg">
  <!-- Shared navbar (your loader fills this) -->
  <div id="navbar"></div>

  <main class="chat-wrapper">
    <div class="chat-card chat-panel" aria-label="Group chat">
      <h2>Group Chat</h2>

      <!-- message list -->
      <div id="chatBox" class="chat-box" role="log" aria-live="polite"></div>

      <!-- composer -->
      <div class="input-row">
        <input id="chatInput" type="text" placeholder="Type a message..." autocomplete="off" />
        <button id="sendBtn" type="button">Send</button>
      </div>

      <div class="footnotes">
        <div>✅ Connected to group</div>
        <div>🗓️ Showing messages from the last 24 hours</div>
      </div>
    </div>
  </main>

  <!-- Page-specific logic (keep if you use it) -->
<!-- Chat logic -->
<script type="module" src="./chat.js?v=2025.01.09E"></script>


  <!-- Top app bar + bottom tabs (creates #openMenu) -->
  <script defer src="/ui-shell.js?v=2026.03.16B"></script>

  <!-- Hamburger drawer (depends on #openMenu created by ui-shell) -->
  <script defer src="/scripts/appbar-drawer.js?v=2026.03.16B"></script>

  <!-- Floating avatar (top-right across pages) -->
  <script type="module" src="/avatar-float.js?v=2025.01.09E"></script>
  <script type="module" src="/load-navbar.js?v=2025.01.09E"></script>

</body>
</html>
